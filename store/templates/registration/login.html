{% load static %}
{% include 'header.html' %}

<div class="container">
    <div class="col-12 text-center" style="margin-top: 20px">
        <h2 class="breadcrumb-title">Sign In to Your Account</h2>
    </div>
</div>

<div class="login-register-area pt-100px pb-100px">
    <div class="container">
        <div class="row">
            <div class="col-lg-7 col-md-12 ml-auto mr-auto">
                <div class="login-register-wrapper">
                    <div class="login-register-tab-list nav">
                        <a class="active" href="/accounts/login">
                            <h4>Login</h4>
                        </a>
                        <a href="/accounts/signup">
                            <h4>Sign Up</h4>
                        </a>
                    </div>
                    <div class="tab-content">
                        <div class="tab-pane active">
                            <div class="login-form-container">
                                <div class="login-register-form">
                                    <form method="post">
                                        {% csrf_token %}

                                        {% if form.non_field_errors %}
                                            <div style="color: red; margin-bottom: 10px; text-align: left;">
                                                {% for error in form.non_field_errors %}
                                                    <p>{{ error }}</p>
                                                {% endfor %}
                                            </div>
                                        {% endif %}

                                        <input type="text" name="username" placeholder="Username" required style="text-align: left" />
                                        <input type="password" name="password" placeholder="Password" required style="text-align: left" />

                                        <div class="button-box">
                                            <button type="submit"><span>Login</span></button>
                                        </div>

                                        <input type="hidden" name="next" value="{{ next }}" />
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% include 'footer.html' %}
