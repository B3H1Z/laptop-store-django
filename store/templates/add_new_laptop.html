<!doctype html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Add new Product</title>
    <link rel="stylesheet" href="{% static 'css/add-panel.css' %}"/>

</head>
<body>
<form action="/manage/product/submit" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="form-bg">
        <h3> Add New Product </h3>
        <div class="form">

            <input placeholder="ID" name="id" type="value">
            <input placeholder="Brand" name="brand" list="brands" type="text">
            <datalist id="brands">
                <option value="Acer">
                <option value="Asus">
                <option value="Lenovo">
                <option value="Dell">
                <option value="HP">
            </datalist>

            <input placeholder="Model" name="model" type="text">
            <input placeholder="Display Size" name="size" list="size" type="text">
            <datalist id="size">
                <option value="15.6">
                <option value="17.3">
                <option value="14">
                <option value="11">
            </datalist>

            <input type="text" name="cpuGen" list="cpuGen" placeholder="CPU Gen">
            <datalist id="cpuGen">
                <option value="Core-i9">
                <option value="Core-i7">
                <option value="Core-i5">
                <option value="Core-i3">
                <option value="Ryzen-9">
                <option value="Ryzen-7">
                <option value="Ryzen-5">
            </datalist>

            <input type="text" name="cpuModel" list="cpuModel" placeholder="CPU Model">
            <datalist id="cpuModel">
                <option value="7700HQ">
                <option value="6700H">
                <option value="5600x">
                <option value="5900x">
            </datalist>
            <input placeholder="Ram Size" name="ramSize" type="text">
            <select name="ramSizeUnit" class="ramSizeUnit">
                <option value="GB">GB</option>
                <option value="MB">MB</option>
            </select>
            <input placeholder="Disk Size" name="diskSize" type="text">
            <select name="diskSizeUnit" class="diskSizeUnit">
                <option value="GB">GB</option>
                <option value="TB">TB</option>
            </select>
            <select name="diskType" class="diskType">
                <option value="SSD">SSD</option>
                <option value="HDD">HDD</option>
                <option value="NVMe">NVMe</option>
            </select>
            <input placeholder="GPU Series" list="graphicSeries" name="graphicSeries" type="text">
            <datalist id="graphicSeries">
                <option value="geforce">
                <option value="Radeon">
            </datalist>

            <input placeholder="GPU Model" list="graphicModel" name="graphicModel" type="text">
            <datalist id="graphicModel">
                <option value="1050">
                <option value="rx570">
            </datalist>

            <input placeholder="Usage Type" name="usageType" type="text">
            <input placeholder="Price" name="price" type="text">
            <label>
<textarea placeholder="Description" name="description" type="text">
</textarea>
            </label>
            <label for="image" style="font-size: small">Select Main Product Image</label>
            <input placeholder="Image" type="file" name="image" id="image">
            <label for="hoverImage" style="font-size: small">Select Hover Product Image</label>
            <input placeholder="Hover Image" type="file" name="hoverImage" id="hoverImage">


            <h2 type="submit">
                <button type="submit" style="background-color: transparent;border: 0px">ADD</button>
            </h2>
        </div>
    </div>
</form>
</body>
</html>
